<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng của tôi - PhoneStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container header-inner">
        <a href="/" class="logo">
            <i class="fas fa-mobile-alt"></i>
            <div><span>PhoneStore</span><span class="logo-text-sub">Nhóm 4</span></div>
        </a>
        <form class="search-bar" th:action="@{/}" method="get">
            <i class="fas fa-search"></i>
            <input type="text" name="tuKhoa" placeholder="Bạn muốn mua gì hôm nay?">
        </form>
        <div class="header-actions">
            <a th:href="@{/gio-hang}" class="header-btn cart-btn">
                <i class="fas fa-shopping-cart"></i><span>Giỏ hàng</span>
                <span class="cart-badge" th:text="${soLuongGioHang}" th:if="${soLuongGioHang > 0}">0</span>
            </a>
            <div class="user-menu" th:if="${session.taiKhoan != null}">
                <a href="#" class="header-btn"><i class="fas fa-user-circle"></i><span th:text="${session.tenNguoiDung}">User</span></a>
                <div class="user-dropdown">
                    <a th:href="@{/tai-khoan}"><i class="fas fa-user"></i> Tài khoản</a>
                    <a th:href="@{/dang-xuat}"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                </div>
            </div>
        </div>
    </div>
</header>

<section class="page-section">
    <div class="container" style="max-width: 900px;">
        <div class="page-header">
            <h1><i class="fas fa-box" style="color: #d70018;"></i> Đơn hàng của tôi</h1>
            <a th:href="@{/}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Trang chủ</a>
        </div>

        <!-- Empty -->
        <div class="empty-state" th:if="${#lists.isEmpty(donHangs)}" style="padding: 60px 20px;">
            <i class="fas fa-box-open" style="font-size: 3rem; color: #ddd; margin-bottom: 16px;"></i>
            <h3 style="color: #999;">Bạn chưa có đơn hàng nào</h3>
            <p style="color: #bbb; margin-bottom: 20px;">Hãy mua sắm và quay lại đây nhé!</p>
            <a th:href="@{/}" class="btn btn-primary"><i class="fas fa-shopping-bag"></i> Mua sắm ngay</a>
        </div>

        <!-- Order List -->
        <div th:unless="${#lists.isEmpty(donHangs)}" style="display: flex; flex-direction: column; gap: 16px;">
            <div th:each="dh : ${donHangs}" class="form-card" style="padding: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px;">
                    <div>
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                            <strong style="font-size: 1.05rem;" th:text="${dh.maDonHang}">DH001</strong>
                            <span style="padding: 3px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;"
                                  th:classappend="${dh.trangThai != null && (dh.trangThai.toLowerCase().startsWith('ch'))} ? 'status-cho' : 
                                                  (${dh.trangThai != null && (dh.trangThai.startsWith('Đang') || dh.trangThai.startsWith('Dang'))} ? 'status-ship' : 
                                                  (${dh.trangThai != null && dh.trangThai.startsWith('Ho')} ? 'status-done' : 'status-cancel'))"
                                  th:text="${dh.trangThai != null && (dh.trangThai.toLowerCase().startsWith('ch')) ? 'Chờ xử lý' : 
                                           (dh.trangThai != null && (dh.trangThai.startsWith('Đang') || dh.trangThai.startsWith('Dang')) ? 'Đang giao' : 
                                           (dh.trangThai != null && dh.trangThai.startsWith('Ho') ? 'Hoàn thành' : 
                                           (dh.trangThai != null && dh.trangThai.startsWith('H') && !dh.trangThai.startsWith('Ho') ? 'Đã hủy' : dh.trangThai)))}">Trạng thái</span>
                        </div>
                        <p style="font-size: 0.85rem; color: #999;">
                            <i class="fas fa-calendar-alt" style="margin-right: 4px;"></i>
                            <span th:text="${#temporals.format(dh.ngayDat, 'dd/MM/yyyy HH:mm')}">01/01/2026</span>
                        </p>
                        <p style="font-size: 0.85rem; color: #999; margin-top: 4px;">
                            <i class="fas fa-credit-card" style="margin-right: 4px;"></i>
                            <span th:text="${dh.phuongThucThanhToan}">COD</span>
                        </p>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-size: 1.2rem; font-weight: 700; color: #d70018;"
                           th:text="${#numbers.formatDecimal(dh.tongTien, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</p>
                        <a th:href="@{/don-hang/chi-tiet/{id}(id=${dh.maDonHang})}"
                           class="btn btn-sm" style="margin-top: 8px; background: #f5f5f5; color: #333; border-radius: 6px; padding: 6px 16px; font-size: 0.82rem;">
                            <i class="fas fa-eye"></i> Chi tiết
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container"><div class="footer-bottom"><p>&copy; 2026 PhoneStore - Nhóm 4. All rights reserved.</p></div></div>
</footer>

<style>
    .status-cho { background: #fff3e0; color: #e65100; }
    .status-ship { background: #e3f2fd; color: #1565c0; }
    .status-done { background: #e8f5e9; color: #2e7d32; }
    .status-cancel { background: #fce4ec; color: #c62828; }
</style>

</body>
</html>
