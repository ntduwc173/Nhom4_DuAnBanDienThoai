<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi trả - PhoneStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="header">
    <div class="container header-inner">
        <a href="/" class="logo"><i class="fas fa-mobile-alt"></i><span>PhoneStore</span></a>
        <nav class="nav">
            <a th:href="@{/}" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a>
            <a th:href="@{/pre-order}" class="nav-link"><i class="fas fa-clock"></i> Pre-order</a>
            <a th:href="@{/doi-tra}" class="nav-link active"><i class="fas fa-exchange-alt"></i> Đổi trả</a>
        </nav>
        <a th:href="@{/gio-hang}" class="cart-icon"><i class="fas fa-shopping-cart"></i>
            <span class="cart-badge" th:text="${soLuongGioHang}" th:if="${soLuongGioHang > 0}">0</span></a>
    </div>
</header>

<section class="page-section">
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-exchange-alt"></i> Yêu cầu đổi trả</h1>
            <p class="page-subtitle">Chỉ áp dụng cho đơn hàng đã hoàn thành</p>
        </div>

        <!-- Success / Error messages -->
        <div class="alert alert-success" th:if="${success}">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>
        <div class="alert alert-error" th:if="${error}">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div class="return-layout">
            <!-- Step 1: Tìm đơn hàng -->
            <div class="form-card" th:if="${donHang == null}">
                <h3><i class="fas fa-search"></i> Bước 1: Tìm đơn hàng</h3>
                <form th:action="@{/doi-tra/tim-don}" method="post">
                    <div class="form-group">
                        <label for="maDonHang">Mã đơn hàng <span class="required">*</span></label>
                        <input type="text" id="maDonHang" name="maDonHang" required placeholder="VD: DH1234567890">
                    </div>
                    <div class="form-group">
                        <label for="soDienThoai">Số điện thoại <span class="required">*</span></label>
                        <input type="tel" id="soDienThoai" name="soDienThoai" required placeholder="VD: 0912345678">
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-search"></i> Tìm đơn hàng
                    </button>
                </form>
            </div>

            <!-- Step 2: Chọn lý do và gửi yêu cầu -->
            <div class="form-card" th:if="${donHang != null}">
                <h3><i class="fas fa-check-circle"></i> Tìm thấy đơn hàng</h3>
                <div class="order-info-card">
                    <div class="order-detail">
                        <span>Mã đơn:</span>
                        <strong th:text="${donHang.maDonHang}">DH001</strong>
                    </div>
                    <div class="order-detail">
                        <span>Trạng thái:</span>
                        <span class="status-badge status-done" th:text="${donHang.trangThai}">Hoàn thành</span>
                    </div>
                    <div class="order-detail">
                        <span>Tổng tiền:</span>
                        <strong th:text="${#numbers.formatDecimal(donHang.tongTien, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</strong>
                    </div>
                </div>

                <h3 class="mt-20"><i class="fas fa-edit"></i> Bước 2: Lý do đổi trả</h3>
                <form th:action="@{/doi-tra/gui-yeu-cau}" method="post">
                    <input type="hidden" name="maDonHang" th:value="${donHang.maDonHang}">
                    <div class="form-group">
                        <label for="lyDo">Chọn lý do <span class="required">*</span></label>
                        <select id="lyDo" name="lyDo" required class="form-select">
                            <option value="">-- Chọn lý do đổi trả --</option>
                            <option value="Sản phẩm lỗi/hỏng">Sản phẩm lỗi/hỏng</option>
                            <option value="Sản phẩm không đúng mô tả">Sản phẩm không đúng mô tả</option>
                            <option value="Giao sai sản phẩm">Giao sai sản phẩm</option>
                            <option value="Không còn nhu cầu sử dụng">Không còn nhu cầu sử dụng</option>
                            <option value="Đổi sang sản phẩm khác">Đổi sang sản phẩm khác</option>
                            <option value="Lý do khác">Lý do khác</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-paper-plane"></i> Gửi yêu cầu đổi trả
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>

<footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 PhoneStore - Nhóm 4</p></div></div></footer>
</body>
</html>
