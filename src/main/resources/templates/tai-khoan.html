<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin tài khoản - PhoneStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container header-inner">
        <a href="/" class="logo">
            <i class="fas fa-mobile-alt"></i>
            <div><span>PhoneStore</span><span class="logo-text-sub">Nhóm 4</span></div>
        </a>
        <form class="search-bar" th:action="@{/}" method="get">
            <i class="fas fa-search"></i>
            <input type="text" name="tuKhoa" placeholder="Bạn muốn mua gì hôm nay?">
        </form>
        <div class="header-actions">
            <a th:href="@{/gio-hang}" class="header-btn cart-btn">
                <i class="fas fa-shopping-cart"></i><span>Giỏ hàng</span>
            </a>
            <div class="user-menu" th:if="${session.taiKhoan != null}">
                <a href="#" class="header-btn"><i class="fas fa-user-circle"></i><span th:text="${session.tenNguoiDung}">User</span></a>
                <div class="user-dropdown">
                    <a th:href="@{/tai-khoan}"><i class="fas fa-user"></i> Tài khoản</a>
                    <a th:href="@{/dang-xuat}"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                </div>
            </div>
        </div>
    </div>
</header>

<section class="page-section">
    <div class="container" style="max-width: 800px;">
        <div class="page-header">
            <h1><i class="fas fa-user-circle" style="color: #d70018;"></i> Thông tin tài khoản</h1>
            <a th:href="@{/}" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Trang chủ</a>
        </div>

        <!-- Thông báo -->
        <div class="alert alert-success" th:if="${success}">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>
        <div class="alert alert-error" th:if="${error}">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <!-- Thông tin cá nhân -->
        <div class="form-card">
            <h3><i class="fas fa-id-card" style="color: #d70018;"></i> Thông tin cá nhân</h3>
            <form th:action="@{/tai-khoan/cap-nhat}" method="post">
                <div class="form-group">
                    <label>Họ và tên <span class="required">*</span></label>
                    <input type="text" name="ten" th:value="${khachHang?.ten}" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Số điện thoại <span class="required">*</span></label>
                        <input type="tel" name="soDienThoai" th:value="${khachHang?.soDienThoai}" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" th:value="${khachHang?.email}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Địa chỉ</label>
                    <input type="text" name="diaChi" th:value="${khachHang?.diaChi}">
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu thay đổi</button>
            </form>
        </div>

        <!-- Tài khoản -->
        <div class="form-card" style="margin-top: 20px;">
            <h3><i class="fas fa-key" style="color: #d70018;"></i> Thông tin tài khoản</h3>
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" th:value="${taiKhoan?.tenDangNhap}" disabled
                       style="background: #f0f0f0; cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label>Vai trò</label>
                <input type="text" th:value="${taiKhoan?.vaiTro == 'ADMIN' ? 'Quản trị viên' : 'Khách hàng'}" disabled
                       style="background: #f0f0f0; cursor: not-allowed;">
            </div>
        </div>

        <!-- Đổi mật khẩu -->
        <div class="form-card" style="margin-top: 20px;">
            <h3><i class="fas fa-lock" style="color: #d70018;"></i> Đổi mật khẩu</h3>

            <div class="alert alert-success" th:if="${successPw}">
                <i class="fas fa-check-circle"></i> <span th:text="${successPw}"></span>
            </div>
            <div class="alert alert-error" th:if="${errorPw}">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${errorPw}"></span>
            </div>

            <form th:action="@{/tai-khoan/doi-mat-khau}" method="post">
                <div class="form-group">
                    <label>Mật khẩu hiện tại <span class="required">*</span></label>
                    <input type="password" name="matKhauCu" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Mật khẩu mới <span class="required">*</span></label>
                        <input type="password" name="matKhauMoi" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Xác nhận mật khẩu mới <span class="required">*</span></label>
                        <input type="password" name="xacNhanMatKhauMoi" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-key"></i> Đổi mật khẩu</button>
            </form>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container"><div class="footer-bottom"><p>&copy; 2026 PhoneStore - Nhóm 4. All rights reserved.</p></div></div>
</footer>

</body>
</html>
